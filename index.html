<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIGG REG - Menu</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Impact', sans-serif;
            user-select: none;
        }

        body {
            background-color: #030303;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(20, 20, 20, 0.8) 0%, #030303 100%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 16px 16px, 16px 16px;
        }

        /* Main Menu Window Frame */
        .menu-frame {
            position: relative;
            width: 860px;
            height: 580px;
            background: #000000;
            border: 2px solid #1a1a1a;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.95), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        /* Vertical Decorative Side Texts */
        .side-text-left {
            position: absolute;
            left: 15px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .side-text-left .word {
            writing-mode: vertical-lr;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 6px;
            color: #666666;
            font-weight: 900;
        }
        .side-text-left .icon-box {
            width: 24px;
            height: 24px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
        }

        .side-text-right {
            position: absolute;
            right: 15px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .side-text-right .word {
            writing-mode: vertical-lr;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 5px;
            color: #666666;
            font-weight: 900;
        }
        .side-text-right .discord-svg {
            width: 22px;
            height: 22px;
            fill: #666666;
        }

        /* Header Area Styling */
        .menu-header {
            width: 100%;
            text-align: center;
            position: relative;
            margin-bottom: 10px;
        }

        .title-migg {
            font-size: 82px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 0.85;
            background: linear-gradient(to bottom, 
                #ffffff 0%, 
                #f0f0f0 25%, 
                #9c9e9f 45%, 
                #727475 50%, 
                #cccccc 55%, 
                #ffffff 80%, 
                #a3a3a3 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 3px 5px rgba(0, 0, 0, 0.9));
        }

        .divider-ribbon {
            position: relative;
            width: 100%;
            height: 18px;
            margin-top: 5px;
            background: #ffffff;
            clip-path: polygon(0 40%, 15% 0, 85% 0, 100% 40%, 85% 100%, 15% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-reg {
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 12px;
            color: #000000;
            padding-left: 12px;
            line-height: 1;
            text-transform: uppercase;
        }

        /* Control Panels Grid Container */
        .panels-container {
            display: flex;
            width: 100%;
            height: 280px;
            gap: 25px;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        /* Left Main Panel Layout */
        .panel-inject-features {
            flex: 2.8;
            height: 100%;
            border: 1px solid #2d2d2d;
            background: linear-gradient(135deg, #0b0b0b 0%, #040404 100%);
            display: flex;
            padding: 25px;
            position: relative;
            border-radius: 4px;
        }

        .panel-column-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border-right: 1px solid #1f1f1f;
            padding-right: 15px;
        }

        .panel-column-right {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding-left: 15px;
        }

        /* Right Clear Panel Layout */
        .panel-clear-actions {
            flex: 0.9;
            height: 100%;
            border: 1px solid #2d2d2d;
            background: linear-gradient(135deg, #0b0b0b 0%, #040404 100%);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 25px 15px;
            position: relative;
            overflow: hidden;
        }

        .watermark-x {
            position: absolute;
            font-size: 160px;
            color: #0f0f0f;
            font-weight: 900;
            font-style: italic;
            line-height: 1;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Image Containers & App Icons styling */
        .icon-wrapper-regedit {
            width: 105px;
            height: 105px;
            background: linear-gradient(180deg, rgba(40,40,40,0.6) 0%, rgba(15,15,15,0.8) 100%);
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.1);
        }

        .icon-wrapper-regedit img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.4));
        }

        .icon-garena-brand {
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-garena-brand img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 0px 12px rgba(255, 50, 50, 0.3));
        }

        /* Interactive Buttons */
        .btn-action {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 15px;
            font-size: 19px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            box-shadow: inset 0 -3px 0 #b0b0b0, 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            position: relative;
            z-index: 2;
        }

        .btn-action:active {
            transform: scale(0.97);
            background: #e5e5e5;
            box-shadow: inset 0 -1px 0 #b0b0b0, 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-action:disabled {
            background: #444444 !important;
            color: #aaaaaa !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .btn-clear {
            background: transparent;
            color: #8c8c8c;
            border: 2px solid #333333;
            box-shadow: none;
            font-size: 15px;
            width: 95%;
        }

        .btn-clear:hover {
            color: #ffffff;
            border-color: #555555;
            background: rgba(255,255,255,0.02);
        }

        .label-brand-sub {
            font-size: 17px;
            font-style: italic;
            font-weight: 900;
            color: #aaaaaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .menu-footer {
            width: 100%;
            text-align: center;
        }

        .footer-shop-link {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .loading-pulse {
            animation: pulseState 0.5s infinite alternate;
        }
        @keyframes pulseState {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="menu-frame">
        
        <div class="side-text-left">
            <div class="word">GOD</div>
            <div class="icon-box">&#x2328;</div>
        </div>

        <div class="side-text-right">
            <div class="word">DISCORD</div>
            <svg class="discord-svg" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-10.93,68.6,68.6,0,0,1-10.64-5.12c.91-.67,1.81-1.37,2.65-2.1a75.22,75.22,0,0,0,72.86,0c.84.73,1.74,1.43,2.65,2.1a68.86,68.86,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,10.93,105.73,105.73,0,0,0,31.05-18.83C129.92,50.7,124.16,27.78,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.87,46,53.87,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.11,46,96.11,53,91,65.69,84.69,65.69Z"/>
            </svg>
        </div>

        <div class="menu-header">
            <div class="title-migg">MIGG</div>
            <div class="divider-ribbon">
                <div class="title-reg">REG</div>
            </div>
        </div>

        <div class="panels-container">
            
            <div class="panel-inject-features">
                <div class="panel-column-left">
                    <div class="icon-wrapper-regedit">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Windows_11_registry_editor_icon.svg" alt="Registry Editor">
                    </div>
                    <button class="btn-action" id="actionInjectBtn">INJECT</button>
                </div>

                <div class="panel-column-right">
                    <div class="icon-garena-brand">
                        <img src="https://crystalpng.com/wp-content/uploads/2025/09/garena-logo.png" alt="Garena Logo">
                    </div>
                    <div class="label-brand-sub">REG FREEFIRE</div>
                </div>
            </div>

            <div class="panel-clear-actions">
                <div class="watermark-x">X</div>
                <button class="btn-action btn-clear">CLEAR</button>
            </div>

        </div>

        <div class="menu-footer">
            <div class="footer-shop-link">WEBSITE : MIGG SHOP</div>
        </div>

    </div>

    <script>
        document.getElementById('actionInjectBtn').addEventListener('click', function() {
            const currentBtn = this;
            if (currentBtn.disabled) return;
            
            currentBtn.disabled = true;
            currentBtn.classList.add('loading-pulse');
            
            let secondsRemaining = 2;
            currentBtn.innerText = `WAIT (${secondsRemaining}s)`;

            const dynamicCountdown = setInterval(() => {
                secondsRemaining--;
                if (secondsRemaining > 0) {
                    currentBtn.innerText = `WAIT (${secondsRemaining}s)`;
                } else {
                    clearInterval(dynamicCountdown);
                    currentBtn.innerText = "OPENING...";
                    
                    // Direct deep-link redirect for Free Fire iOS app scheme
                    window.location.href = "freefire://";

                    setTimeout(() => {
                        currentBtn.disabled = false;
                        currentBtn.classList.remove('loading-pulse');
                        currentBtn.innerText = "INJECT";
                    }, 1800);
                }
            }, 1000);
        });
    </script>
</body>
</html>
