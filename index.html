<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIGG REG</title>
    <style>
        /* Base Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Impact, sans-serif;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle, #111 10%, #050505 90%);
        }

        /* Main Container matching the UI Aspect */
        .wrapper {
            position: relative;
            width: 800px;
            height: 500px;
            background-color: #000000;
            border: 2px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        /* Side Text (GOD & DISCORD) */
        .side-text-left {
            position: absolute;
            left: 15px;
            bottom: 20px;
            writing-mode: vertical-lr;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 4px;
            color: #555;
        }

        .side-text-right {
            position: absolute;
            right: 15px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            color: #555;
            writing-mode: vertical-lr;
        }

        .discord-icon {
            width: 20px;
            height: 20px;
            fill: #555;
            transform: rotate(90deg);
        }

        /* Header / Metallic Typography */
        .header {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .main-title {
            font-size: 64px;
            font-style: italic;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #e1e1e1 40%, #a1a1a1 60%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));
            line-height: 0.9;
        }

        .sub-title {
            font-size: 24px;
            font-style: italic;
            letter-spacing: 8px;
            color: #ffffff;
            border-top: 3px solid #ffffff;
            display: inline-block;
            padding: 0 40px;
            margin-top: 5px;
        }

        /* Center Grid Layout */
        .content-container {
            display: flex;
            gap: 20px;
            width: 90%;
            height: 240px;
            justify-content: center;
            align-items: center;
        }

        /* Left Main Panel */
        .panel-main {
            flex: 3;
            height: 100%;
            border: 2px solid #333;
            background: linear-gradient(135deg, #0d0d0d 0%, #050505 100%);
            display: flex;
            padding: 20px;
            position: relative;
        }

        .section-inject {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border-right: 1px solid #222;
            padding-right: 10px;
        }

        .section-logo {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding-left: 10px;
        }

        /* Right Clear Panel */
        .panel-clear {
            flex: 0.8;
            height: 100%;
            border: 2px solid #333;
            background: linear-gradient(135deg, #0d0d0d 0%, #050505 100%);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 10px;
        }

        /* Regedit Icon Styling */
        .regedit-container {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 8px rgba(0, 120, 212, 0.4));
        }

        /* Buttons Styling */
        .btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 8px 24px;
            font-size: 18px;
            font-style: italic;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 85%;
            text-align: center;
            box-shadow: inset 0 -3px 0 #b5b5b5;
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
            background: #e0e0e0;
        }

        .btn-clear {
            background: transparent;
            color: #aaaaaa;
            border: 2px solid #444;
            box-shadow: none;
            width: 90%;
            font-size: 14px;
        }
        
        .btn-clear:hover {
            color: #fff;
            border-color: #666;
        }

        /* Static Texts inside panels */
        .ff-text {
            font-size: 16px;
            font-style: italic;
            color: #888;
            letter-spacing: 2px;
        }

        .clear-title-x {
            font-size: 56px;
            color: #1a1a1a;
            font-style: italic;
            line-height: 1;
            margin-top: 15px;
        }

        /* Footer */
        .footer-text {
            font-size: 12px;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Utility Class for Counting/Status UI */
        .status-pulse {
            animation: pulse 1s infinite alternate;
            color: #ff3b30 !important;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="side-text-left">GOD</div>

        <div class="side-text-right">
            DISCORD
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-10.93,68.6,68.6,0,0,1-10.64-5.12c.91-.67,1.81-1.37,2.65-2.1a75.22,75.22,0,0,0,72.86,0c.84.73,1.74,1.43,2.65,2.1a68.86,68.86,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,10.93,105.73,105.73,0,0,0,31.05-18.83C129.92,50.7,124.16,27.78,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.87,46,53.87,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.11,46,96.11,53,91,65.69,84.69,65.69Z"/>
            </svg>
        </div>

        <div class="header">
            <div class="main-title">MIGG</div>
            <div class="sub-title">REG</div>
        </div>

        <div class="content-container">
            
            <div class="panel-main">
                
                <div class="section-inject">
                    <div class="regedit-container">
                        <svg viewBox="0 0 64 64" width="70" height="70">
                            <path d="M12 36 L28 28 L28 46 L12 54 Z" fill="#005A9E" />
                            <path d="M28 28 L44 36 L44 54 L28 46 Z" fill="#0078D4" />
                            <path d="M12 36 L28 28 L44 36 L28 44 Z" fill="#2Bb8FF" />
                            
                            <path d="M28 16 L44 8 L44 26 L28 34 Z" fill="#005A9E" />
                            <path d="M44 8 L60 16 L60 34 L44 26 Z" fill="#0078D4" />
                            <path d="M28 16 L44 8 L60 16 L44 24 Z" fill="#2Bb8FF" />

                            <g transform="translate(-6, -10)">
                                <path d="M16 20 L26 15 L26 25 L16 30 Z" fill="#D83B01" />
                                <path d="M26 15 L36 20 L36 30 L26 25 Z" fill="#F14F21" />
                                <path d="M16 20 L26 15 L36 20 L26 25 Z" fill="#F85A3F" />
                            </g>
                        </svg>
                    </div>
                    <button class="btn" id="injectBtn">INJECT</button>
                </div>

                <div class="section-logo">
                    <svg width="90" height="90" viewBox="0 0 100 100" fill="none">
                        <path d="M85,30 C75,15 50,10 35,25 C25,35 22,50 28,62 C22,55 18,45 20,35 C12,48 10,65 22,78 C35,92 60,95 78,82 C92,70 95,48 85,30 Z" fill="url(#silverGradient)" />
                        <path d="M68,45 C62,38 50,35 42,42 C36,48 35,58 40,65 C35,58 35,50 40,45 C32,52 32,65 42,72 C50,78 62,75 68,65 C72,58 72,50 68,45 Z" fill="#111" opacity="0.7"/>
                        <defs>
                            <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ffffff" />
                                <stop offset="50%" stop-color="#a1a1a1" />
                                <stop offset="100%" stop-color="#444444" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="ff-text">REG FREEFIRE</div>
                </div>

            </div>

            <div class="panel-clear">
                <div class="clear-title-x">X</div>
                <button class="btn btn-clear">CLEAR</button>
            </div>

        </div>

        <div class="footer-text">WEBSITE : MIGG SHOP</div>
    </div>

    <script>
        document.getElementById('injectBtn').addEventListener('click', function() {
            const button = this;
            
            // Prevent duplicate clicks during loading phase
            if (button.disabled) return;
            button.disabled = true;
            button.classList.add('status-pulse');
            
            let timeLeft = 2;
            button.innerText = `WAIT (${timeLeft}s)`;

            // Countdown timer running every 1 second
            const countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    button.innerText = `WAIT (${timeLeft}s)`;
                } else {
                    clearInterval(countdownInterval);
                    button.innerText = "OPENING...";
                    
                    // iOS deep-linking URL scheme to open Garena Free Fire
                    // Standard universal scheme: freefire:// 
                    // Regional alternative bundle identifier scheme: com.dts.freefireth://
                    window.location.href = "freefire://";

                    // Reset button state safely after a delay if app fails to switch over
                    setTimeout(() => {
                        button.disabled = false;
                        button.classList.remove('status-pulse');
                        button.innerText = "INJECT";
                    }, 1500);
                }
            }, 1000);
        });
    </script>
</body>
</html>
